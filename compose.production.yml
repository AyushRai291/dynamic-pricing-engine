name: dynamic-pricing-engine-production

services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  ml:
    image: dynamic-pricing-ml:production
    build:
      context: .
      dockerfile: apps/ml-service/Dockerfile.production
    networks:
      - backend
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrate:
    image: dynamic-pricing-api-migrate:production
    build:
      context: .
      dockerfile: apps/api/Dockerfile.production
      target: migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      MIGRATIONS_DIR: /app/database/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true

  api:
    image: dynamic-pricing-api:production
    build:
      context: .
      dockerfile: apps/api/Dockerfile.production
      target: api
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      ML_SERVICE_URL: http://ml:8000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      TRUST_PROXY: 1
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_GENERAL_MAX: ${RATE_LIMIT_GENERAL_MAX:-120}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-20}
      RATE_LIMIT_EXPENSIVE_MAX: ${RATE_LIMIT_EXPENSIVE_MAX:-10}
      PRICE_SUGGESTION_TTL_HOURS: ${PRICE_SUGGESTION_TTL_HOURS:-24}
      QUEUE_REDIS_CONNECT_TIMEOUT_MS: ${QUEUE_REDIS_CONNECT_TIMEOUT_MS:-5000}
      QUEUE_REDIS_COMMAND_TIMEOUT_MS: ${QUEUE_REDIS_COMMAND_TIMEOUT_MS:-5000}
      SCRAPER_CRON_ENABLED: ${SCRAPER_CRON_ENABLED:-true}
      SCRAPER_CRON_EXPRESSION: ${SCRAPER_CRON_EXPRESSION:-0 */4 * * *}
      SCRAPER_ALLOW_PRIVATE_URLS: "false"
      SCRAPER_DISABLE_CHROMIUM_SANDBOX: "true"
      SCRAPER_MAX_HTML_BYTES: ${SCRAPER_MAX_HTML_BYTES:-2000000}
      SCRAPER_MAX_REDIRECTS: ${SCRAPER_MAX_REDIRECTS:-5}
      ML_REQUEST_TIMEOUT_MS: ${ML_REQUEST_TIMEOUT_MS:-5000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GEMINI_REQUEST_TIMEOUT_MS: ${GEMINI_REQUEST_TIMEOUT_MS:-10000}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend
      - egress
    restart: unless-stopped
    stop_grace_period: 45s
    shm_size: 1gb
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "--input-type=module", "-e", "const response = await fetch('http://127.0.0.1:5000/health/ready'); if (!response.ok) process.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: dynamic-pricing-web:production
    build:
      context: .
      dockerfile: apps/web/Dockerfile.production
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
      - edge
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  backend:
    internal: true
  egress:
  edge:

volumes:
  postgres_data:
  redis_data:
