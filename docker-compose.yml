services:
  postgres:
    image: postgres:16
    container_name: dpe-postgres
    environment:
      POSTGRES_USER: dpe_user
      POSTGRES_PASSWORD: dpe_password
      POSTGRES_DB: dynamic_pricing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dpe-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: